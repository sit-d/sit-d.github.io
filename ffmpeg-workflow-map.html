<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FFmpeg workflow map</title>
<style>
  :root{--bg:#020617;--panel:#0f172a;--panel2:#111827;--grid:#1e293b;--text:#e5e7eb;--muted:#94a3b8;--cyan:#22d3ee;--emerald:#34d399;--violet:#a78bfa;--amber:#fbbf24;--rose:#fb7185;--orange:#fb923c;--slate:#94a3b8;--blue:#60a5fa;--line:#334155;--hot:#f8fafc;}
  *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0%,#0b2535 0,#020617 38%),var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;min-height:100vh;}
  header{display:flex;gap:18px;align-items:flex-start;justify-content:space-between;padding:24px 28px 14px;border-bottom:1px solid #1e293b;background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(2,6,23,.72));position:sticky;top:0;z-index:5;backdrop-filter:blur(10px)}
  h1{margin:0;font-size:21px;letter-spacing:-.02em}.subtitle{color:var(--muted);font-size:12px;margin-top:8px;max-width:940px;line-height:1.55}.dot{display:inline-block;width:10px;height:10px;border-radius:99px;background:var(--emerald);box-shadow:0 0 22px var(--emerald);margin-right:10px;animation:pulse 1.8s infinite}@keyframes pulse{50%{opacity:.45;transform:scale(.82)}}
  .meta{display:grid;grid-template-columns:repeat(4,max-content);gap:8px;font-size:11px}.pill{border:1px solid #334155;border-radius:999px;padding:6px 9px;color:#cbd5e1;background:#0b1120}.pill strong{color:#fff}
  main{display:grid;grid-template-columns:minmax(760px,1fr) 430px;gap:16px;padding:16px}.card{background:rgba(15,23,42,.76);border:1px solid #243244;border-radius:16px;box-shadow:0 18px 70px rgba(0,0,0,.28);overflow:hidden}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid #243244}.toolbar h2{font-size:13px;margin:0;color:#cbd5e1}.flowbar{display:flex;gap:8px;flex-wrap:wrap}.flowbtn,.smallbtn{border:1px solid #334155;background:#0b1220;color:#cbd5e1;border-radius:999px;padding:7px 10px;font:inherit;font-size:11px;cursor:pointer}.flowbtn:hover,.smallbtn:hover{border-color:var(--cyan);color:#fff}.flowbtn.active{background:rgba(34,211,238,.12);border-color:var(--cyan);box-shadow:0 0 0 1px rgba(34,211,238,.16) inset}.canvas-wrap{position:relative;padding:0;min-height:650px}.drop{position:absolute;inset:14px;border:1px dashed transparent;border-radius:14px;pointer-events:none;z-index:2}.dragging .drop{border-color:var(--cyan);background:rgba(34,211,238,.07)} svg{display:block;width:100%;height:650px;background:#020617;background-image:linear-gradient(#1e293b 1px,transparent 1px),linear-gradient(90deg,#1e293b 1px,transparent 1px);background-size:40px 40px}.node rect.back{fill:#0f172a}.node rect.face{stroke-width:1.5}.node text{pointer-events:none}.node .label{fill:#f8fafc;font-size:12px;font-weight:700}.node .pkg{fill:#94a3b8;font-size:9px}.node .metric{fill:#64748b;font-size:8px}.node.dim{opacity:.28}.node.hot rect.face{filter:url(#glow);stroke-width:2.3}.edge{stroke:#334155;stroke-width:1.4;fill:none;marker-end:url(#arrow);opacity:.5}.edge.hot{stroke:var(--cyan);stroke-width:2.5;opacity:1;marker-end:url(#arrowHot)}.edge.dim{opacity:.12}.step-dot{fill:#020617;stroke:var(--cyan);stroke-width:1.6}.step-label{fill:#e0f2fe;font-size:9px;font-weight:700}.legend{padding:12px 14px;border-top:1px solid #243244;display:flex;gap:12px;flex-wrap:wrap;color:#94a3b8;font-size:11px}.sw{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:-1px}.side{display:grid;grid-template-rows:auto minmax(210px,1fr) minmax(260px,1fr);gap:16px}.panel{padding:14px}.panel h3{margin:0 0 8px;font-size:13px}.desc{font-size:12px;line-height:1.55;color:#cbd5e1}.steps{display:grid;gap:8px;margin-top:12px}.step{border:1px solid #27364b;background:#0b1220;border-radius:12px;padding:10px;font-size:11px}.step b{color:#fff}.passes{color:#94a3b8;margin-top:6px;white-space:pre-wrap}.editor{display:grid;grid-template-rows:auto 1fr auto;height:100%} textarea{width:100%;height:100%;min-height:260px;resize:vertical;background:#030712;color:#d1fae5;border:1px solid #334155;border-radius:12px;padding:11px;font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.status{font-size:11px;color:#94a3b8}.err{color:var(--rose)} input[type=file]{display:none}.kbd{border:1px solid #334155;border-bottom-width:2px;border-radius:6px;padding:1px 5px;color:#cbd5e1;background:#020617}
  @media(max-width:1100px){main{grid-template-columns:1fr}.side{grid-template-rows:auto}.meta{grid-template-columns:repeat(2,max-content)}}
</style>
</head>
<body>
<header><div><h1><span class="dot"></span><span id="title"></span></h1><div class="subtitle" id="subtitle"></div></div><div class="meta" id="meta"></div></header>
<main>
<section class="card"><div class="toolbar"><h2>Architecture canvas</h2><div class="flowbar" id="flowbar"></div></div><div class="canvas-wrap" id="dropHost"><div class="drop"></div><svg id="map" viewBox="0 0 1340 640" role="img" aria-label="FFmpeg workflow architecture map"></svg></div><div class="legend" id="legend"></div></section>
<aside class="side"><section class="card panel"><h3 id="flowTitle">Flow</h3><div class="desc" id="flowDesc"></div><div class="steps" id="steps"></div></section><section class="card panel editor"><div class="row"><h3>JSON editor / drop file</h3><div><button class="smallbtn" id="formatBtn">Format</button><button class="smallbtn" id="applyBtn">Apply</button><label class="smallbtn" for="fileInput">Load file</label><input id="fileInput" type="file" accept="application/json,.json" /></div></div><textarea id="jsonText" spellcheck="false"></textarea><div class="row"><span class="status" id="status">Drop a JSON spec anywhere on the canvas, edit here, then Apply.</span><span class="status"><span class="kbd">Esc</span> clears drag state</span></div></section></aside>
</main>
<script id="initial-spec" type="application/json">{"title": "FFmpeg intrinsic / LLVM implementation workflow map", "subtitle": "Inferred from /home/bitrake/ffmpeg-intrinsic-llvm after fetching latest upstream master.", "generated_at": "2026-05-13T12:39:53Z", "repo": "/home/bitrake/ffmpeg-intrinsic-llvm", "baseline_worktree": "/home/bitrake/ffmpeg-main-baseline", "branches": {"upstream_master": "4851060ccd28", "ffmpeg-main/latest": "4851060ccd28", "ggmpeg": "3e4a46c42ec8", "intrinsic/llvm-implementations": "3e4a46c42ec8", "upstream_only_commits": "8", "branch_only_commits": "312"}, "components": [{"id": "branch-upstream", "label": "Upstream baseline", "package": "upstream/master", "type": "external", "x": 80, "y": 70, "description": "Latest fetched FFmpeg master at 4851060ccd28; local ffmpeg-main/latest points here.", "metrics": {"commit": "4851060ccd28"}}, {"id": "branch-ggmpeg", "label": "Intrinsic / LLVM branch", "package": "ggmpeg + intrinsic/llvm-implementations", "type": "security", "x": 80, "y": 205, "description": "Shared rolling branch for NASM-removal, intrinsic, LLVM-lowering, and R5 fallback work at 3e4a46c42ec8.", "metrics": {"commit": "3e4a46c42ec8", "upstream_only_commits": "8", "branch_only_commits": "312"}}, {"id": "fftools", "label": "CLI frontends", "package": "fftools", "type": "frontend", "x": 360, "y": 70, "description": "ffmpeg/ffprobe entrypoints drive demux, decode, filter, encode, mux orchestration.", "metrics": {"c_h_files": 46, "asm_files": 0}}, {"id": "libavformat", "label": "Container I/O", "package": "libavformat", "type": "backend", "x": 620, "y": 70, "description": "Demuxers/muxers, protocols, packetized I/O, stream metadata, and timestamp plumbing.", "metrics": {"c_h_files": 711, "asm_files": 0}}, {"id": "libavcodec", "label": "Codecs + DSP", "package": "libavcodec", "type": "backend", "x": 880, "y": 70, "description": "Codec implementations plus architecture-specific DSP dispatch; main high-volume NASM/intrinsic migration surface.", "metrics": {"c_h_files": 2427, "asm_files": 289}}, {"id": "libavfilter", "label": "Filter graphs", "package": "libavfilter", "type": "backend", "x": 620, "y": 210, "description": "Audio/video filter graph execution, including x86-accelerated filters and AVX-512 research candidates.", "metrics": {"c_h_files": 729, "asm_files": 46}}, {"id": "libswscale", "label": "Pixel conversion", "package": "libswscale", "type": "database", "x": 880, "y": 210, "description": "Scaling, colorspace conversion, planar/packed pixel transforms; active R2/R2.5/R5 campaign area.", "metrics": {"c_h_files": 114, "asm_files": 32}}, {"id": "libswresample", "label": "Audio conversion", "package": "libswresample", "type": "database", "x": 1140, "y": 210, "description": "Resampling and audio format conversion with x86 intrinsic coverage already present in this branch.", "metrics": {"c_h_files": 35, "asm_files": 7}}, {"id": "libavutil", "label": "Shared primitives", "package": "libavutil", "type": "database", "x": 620, "y": 350, "description": "Common math, frame/buffer primitives, CPU flags, memops, and utility DSP helpers.", "metrics": {"c_h_files": 416, "asm_files": 29}}, {"id": "tests-checkasm", "label": "checkasm", "package": "tests/checkasm", "type": "message", "x": 880, "y": 350, "description": "Focused correctness and same-tier microbenchmark harness for DSP functions and dispatch routes.", "metrics": {"c_h_files": 101, "asm_files": 4}}, {"id": "fate", "label": "FATE/regression tests", "package": "tests/fate + tests/ref", "type": "message", "x": 1140, "y": 350, "description": "Broader functional regression suite comparing command output and reference media behavior.", "metrics": {"c_h_files": 117, "asm_files": 4}}, {"id": "nasm-oracle", "label": "NASM/x86inc oracle", "package": "lib*/x86/*.asm", "type": "security", "x": 360, "y": 350, "description": "Original hand assembly remains the performance/correctness oracle until replacements are proven.", "metrics": {"c_h_files": 146, "asm_files": 112}}, {"id": "llvm-codegen", "label": "LLVM/Clang codegen", "package": "clang + llvm-objdump", "type": "cloud", "x": 360, "y": 490, "description": "Compiler lowering target: R0/R1 shaped C, R2/R2.5 intrinsics, then documented LLVM gaps/R5 only when measured.", "metrics": {"c_h_files": 0, "asm_files": 0}}, {"id": "docs-hermes", "label": "Hermes migration docs", "package": "doc/hermes", "type": "external", "x": 620, "y": 490, "description": "Campaign policy, inventory, backlog, branch notes, gap reports, and generated workflow map.", "metrics": {"c_h_files": 0, "asm_files": 0}}, {"id": "no-x86asm-build", "label": "No-x86asm build lane", "package": "configure --disable-x86asm", "type": "cloud", "x": 880, "y": 490, "description": "Audit lane proving intrinsic/C replacements compile and dispatch when NASM is unavailable.", "metrics": {"c_h_files": 27, "asm_files": 0}}, {"id": "bench-artifacts", "label": "Bench artifacts", "package": "compare.md / snapshots", "type": "message", "x": 1140, "y": 490, "description": "Paired NASM-vs-intrinsic bench outputs, disassembly notes, and route decisions.", "metrics": {"c_h_files": 0, "asm_files": 0}}], "flows": [{"id": "transcode-cli", "label": "CLI transcode path", "description": "End-to-end runtime path from ffmpeg command to container I/O, codec DSP, filtering, and mux output.", "steps": [{"from": "fftools", "to": "libavformat", "label": "open input / demux packets", "passes": {"data": ["AVFormatContext", "AVPacket", "stream metadata"]}}, {"from": "libavformat", "to": "libavcodec", "label": "send packets to decoder", "passes": {"data": ["compressed packets", "codec parameters"]}}, {"from": "libavcodec", "to": "libavfilter", "label": "decoded frames into graph", "passes": {"data": ["AVFrame", "time base", "format/layout"]}}, {"from": "libavfilter", "to": "libswscale", "label": "video format/scale where needed", "passes": {"data": ["planes", "strides", "colorspace"]}}, {"from": "libavfilter", "to": "libswresample", "label": "audio convert/resample where needed", "passes": {"data": ["samples", "layout", "rate"]}}, {"from": "libavfilter", "to": "libavcodec", "label": "encode filtered frames", "passes": {"data": ["AVFrame", "encoder options"]}}, {"from": "libavcodec", "to": "libavformat", "label": "mux encoded packets", "passes": {"data": ["AVPacket", "timestamps", "side data"]}}]}, {"id": "intrinsic-migration", "label": "Intrinsic / LLVM implementation lane", "description": "How a handwritten assembly algorithm becomes a C/intrinsic/LLVM-shaped implementation while preserving NASM as oracle.", "steps": [{"from": "branch-upstream", "to": "branch-ggmpeg", "label": "branch latest baseline", "passes": {"git": ["ffmpeg-main/latest", "intrinsic/llvm-implementations"]}}, {"from": "nasm-oracle", "to": "libavcodec", "label": "identify algorithm + oracle symbol", "passes": {"evidence": ["x86inc cglobal", "DSP init dispatch", "checkasm coverage"]}}, {"from": "libavcodec", "to": "llvm-codegen", "label": "R0/R1/R2/R2.5 lowering attempt", "passes": {"implementation": ["shaped C", "target attributes", "SIMD intrinsics", "ISA fences"]}}, {"from": "llvm-codegen", "to": "libavcodec", "label": "replacement symbol + dispatch candidate", "passes": {"symbols": ["*_intrinsics", "R5_PICK_DEFERRED / R5_PICK_INTRINSIC"]}}, {"from": "libavcodec", "to": "tests-checkasm", "label": "focused parity + bench", "passes": {"checks": ["edge cases", "same-tier cycles", "ISA containment"]}}, {"from": "tests-checkasm", "to": "bench-artifacts", "label": "record route decision", "passes": {"artifacts": ["bench snapshot", "objdump review", "gap doc if needed"]}}, {"from": "bench-artifacts", "to": "docs-hermes", "label": "update durable campaign notes", "passes": {"docs": ["backlog row", "library status", "LLVM gap"]}}]}, {"id": "compare-main", "label": "Test branch against main", "description": "Keeps latest upstream master as comparison baseline, then validates the intrinsic/LLVM branch through focused and broad gates.", "steps": [{"from": "branch-upstream", "to": "tests-checkasm", "label": "baseline build/checkasm", "passes": {"baseline": ["upstream/master", "ffmpeg-main/latest"]}}, {"from": "branch-ggmpeg", "to": "tests-checkasm", "label": "branch build/checkasm", "passes": {"candidate": ["ggmpeg", "intrinsic/llvm-implementations"]}}, {"from": "tests-checkasm", "to": "bench-artifacts", "label": "compare NASM vs intrinsic + branch vs main", "passes": {"metrics": ["median cycles", "worst delta", "functional parity"]}}, {"from": "branch-ggmpeg", "to": "fate", "label": "broader FATE smoke before push", "passes": {"scope": ["changed libs", "CPU feature matrix when needed"]}}, {"from": "bench-artifacts", "to": "docs-hermes", "label": "publish decision trail", "passes": {"result": ["route", "defer", "R5 fallback", "keep NASM"]}}]}, {"id": "no-x86asm-audit", "label": "No-x86asm coverage audit", "description": "Proves migrated code is not accidentally hidden behind HAVE_X86ASM and remains usable without NASM.", "steps": [{"from": "branch-ggmpeg", "to": "no-x86asm-build", "label": "configure --disable-x86asm", "passes": {"config": ["ARCH_X86 path", "intrinsic objects in OBJS-*"]}}, {"from": "no-x86asm-build", "to": "libavcodec", "label": "compile init + intrinsic objects", "passes": {"objects": ["*_init.o", "*_intrinsics.o"]}}, {"from": "no-x86asm-build", "to": "tests-checkasm", "label": "run focused checkasm in no-NASM lane", "passes": {"checks": ["dispatch reaches intrinsic", "no unresolved NASM symbols"]}}, {"from": "tests-checkasm", "to": "docs-hermes", "label": "record build coverage", "passes": {"docs": ["slice note", "inventory update"]}}]}, {"id": "library-surfaces", "label": "Repository surface overview", "description": "Highlights major FFmpeg packages and where accelerated algorithms usually flow.", "steps": [{"from": "libavutil", "to": "libavcodec", "label": "shared CPU/memory primitives"}, {"from": "libavutil", "to": "libavfilter", "label": "frames, buffers, pixel/sample helpers"}, {"from": "libavcodec", "to": "nasm-oracle", "label": "x86 DSP oracle symbols"}, {"from": "libswscale", "to": "nasm-oracle", "label": "pixel conversion assembly oracles"}, {"from": "libswresample", "to": "nasm-oracle", "label": "audio conversion assembly oracles"}, {"from": "docs-hermes", "to": "branch-ggmpeg", "label": "policy constrains implementation choices"}]}], "schema_notes": ["Edit JSON in the panel or drop a .json file onto the canvas; Apply redraws the map.", "Component x/y coordinates are SVG canvas positions.", "Flow steps use from/to component ids and optional passes metadata."]}</script>
<script>
const colors={frontend:['rgba(8,51,68,.45)','#22d3ee'],backend:['rgba(6,78,59,.45)','#34d399'],database:['rgba(76,29,149,.42)','#a78bfa'],cloud:['rgba(120,53,15,.35)','#fbbf24'],security:['rgba(136,19,55,.42)','#fb7185'],message:['rgba(251,146,60,.32)','#fb923c'],external:['rgba(30,41,59,.62)','#94a3b8']};
let spec=JSON.parse(document.getElementById('initial-spec').textContent), activeFlow=spec.flows[0]?.id;
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function setStatus(msg,err=false){$('status').textContent=msg;$('status').className='status'+(err?' err':'')}
function flow(){return spec.flows.find(f=>f.id===activeFlow)||spec.flows[0]}
function activeSets(f){let nodes=new Set(), edges=new Set(); (f?.steps||[]).forEach((s,i)=>{nodes.add(s.from);nodes.add(s.to);edges.add(s.from+'->'+s.to+'#'+i)}); return {nodes,edges}}
function pathD(a,b){let ax=a.x+92, ay=a.y+34, bx=b.x+92, by=b.y+34; let dx=Math.max(80,Math.abs(bx-ax)*.42); return `M ${ax} ${ay} C ${ax+dx} ${ay}, ${bx-dx} ${by}, ${bx} ${by}`}
function draw(){
 document.title=spec.title||'Workflow map'; $('title').textContent=spec.title||'Workflow map'; $('subtitle').textContent=spec.subtitle||'';
 $('meta').innerHTML=Object.entries(spec.branches||{}).slice(0,6).map(([k,v])=>`<span class="pill"><strong>${esc(k)}</strong> ${esc(v)}</span>`).join('');
 $('flowbar').innerHTML=(spec.flows||[]).map(f=>`<button class="flowbtn ${f.id===activeFlow?'active':''}" data-flow="${esc(f.id)}">${esc(f.label)}</button>`).join('');
 document.querySelectorAll('.flowbtn').forEach(b=>b.onclick=()=>{activeFlow=b.dataset.flow;draw()});
 let f=flow(); let hot=activeSets(f); let byId=Object.fromEntries((spec.components||[]).map(c=>[c.id,c]));
 let svg=$('map'); svg.innerHTML=`<defs><filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22d3ee" flood-opacity=".55"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#334155"/></marker><marker id="arrowHot" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/></marker></defs>`;
 (spec.flows||[]).flatMap(ff=>(ff.steps||[]).map((s,i)=>({s,i,flow:ff}))).forEach(({s,i,flow:ff})=>{let a=byId[s.from],b=byId[s.to]; if(!a||!b)return; let isHot=ff.id===f?.id; let p=document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d',pathD(a,b)); p.setAttribute('class','edge '+(isHot?'hot':'dim')); svg.appendChild(p); if(isHot){let tx=(a.x+b.x)/2+92, ty=(a.y+b.y)/2+34; let g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.innerHTML=`<circle class="step-dot" cx="${tx}" cy="${ty}" r="10"/><text class="step-label" x="${tx}" y="${ty+3}" text-anchor="middle">${i+1}</text>`; svg.appendChild(g);}});
 (spec.components||[]).forEach(c=>{let [fill,stroke]=colors[c.type]||colors.external; let g=document.createElementNS('http://www.w3.org/2000/svg','g'); let cls=hot.nodes.has(c.id)?'hot':(f?'dim':''); g.setAttribute('class','node '+cls); let metric=c.metrics?Object.entries(c.metrics).slice(0,2).map(([k,v])=>`${k}: ${v}`).join(' · '):''; g.innerHTML=`<rect class="back" x="${c.x}" y="${c.y}" width="184" height="68" rx="7"/><rect class="face" x="${c.x}" y="${c.y}" width="184" height="68" rx="7" fill="${fill}" stroke="${stroke}"/><text class="label" x="${c.x+12}" y="${c.y+21}">${esc(c.label).slice(0,24)}</text><text class="pkg" x="${c.x+12}" y="${c.y+39}">${esc(c.package).slice(0,30)}</text><text class="metric" x="${c.x+12}" y="${c.y+56}">${esc(metric).slice(0,34)}</text>`; g.onclick=()=>showComponent(c); svg.appendChild(g);});
 $('legend').innerHTML=Object.entries(colors).map(([k,v])=>`<span><i class="sw" style="background:${v[0]};border:1px solid ${v[1]}"></i>${k}</span>`).join('');
 showFlow(f); $('jsonText').value=JSON.stringify(spec,null,2);
}
function showFlow(f){$('flowTitle').textContent=f?.label||'No flow'; $('flowDesc').textContent=f?.description||''; $('steps').innerHTML=(f?.steps||[]).map((s,i)=>`<div class="step"><b>${i+1}. ${esc(s.from)} → ${esc(s.to)}</b><br>${esc(s.label||'')}<div class="passes">${esc(s.passes?JSON.stringify(s.passes,null,2):'')}</div></div>`).join('')}
function showComponent(c){$('flowTitle').textContent=c.label; $('flowDesc').textContent=(c.description||'')+'\n\nPackage: '+c.package; $('steps').innerHTML=`<div class="step"><b>Component id</b><div class="passes">${esc(c.id)}</div></div><div class="step"><b>Metrics</b><div class="passes">${esc(JSON.stringify(c.metrics||{},null,2))}</div></div>`}
function applyText(){try{let next=JSON.parse($('jsonText').value); if(!Array.isArray(next.components)||!Array.isArray(next.flows)) throw new Error('Spec needs components[] and flows[]'); spec=next; activeFlow=spec.flows[0]?.id; draw(); setStatus('Applied JSON spec.')}catch(e){setStatus(e.message,true)}}
$('applyBtn').onclick=applyText; $('formatBtn').onclick=()=>{try{$('jsonText').value=JSON.stringify(JSON.parse($('jsonText').value),null,2);setStatus('Formatted JSON.')}catch(e){setStatus(e.message,true)}};
$('fileInput').onchange=e=>{let file=e.target.files[0]; if(file) file.text().then(t=>{$('jsonText').value=t; applyText()})};
for (const ev of ['dragenter','dragover']) document.addEventListener(ev,e=>{e.preventDefault();document.body.classList.add('dragging')});
for (const ev of ['dragleave','drop']) document.addEventListener(ev,e=>{e.preventDefault(); if(ev==='drop'){let file=e.dataTransfer.files[0]; if(file) file.text().then(t=>{$('jsonText').value=t; applyText()})} document.body.classList.remove('dragging')});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.body.classList.remove('dragging')});
draw();
</script>
</body>
</html>
